workflows:
  ios-altstore:
    name: iOS AltStore Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build and Package IPA (Unsigned)
        script: |
          # 1. Récupérer les packages (palette_generator, firebase, etc.)
          flutter pub get
          
          # 2. Laisser Flutter configurer iOS, créer le Podfile et compiler l'app en mode Release sans signature
          flutter build ios --release --no-codesign
          
          # 3. Empaqueter le résultat pour AltStore / SideStore (.ipa)
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          mkdir -p output
          zip -r output/VinylHube.ipa Payload

    artifacts:
      - output/VinylHube.ipa