workflows:
  ios-altstore:
    name: iOS AltStore Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build and Package IPA (Unsigned)
        script: |
          # 1. Nettoyer les dépendances et récupérer les packages Dart
          flutter pub get
          
          # 2. Générer l'infrastructure iOS native
          flutter create --platforms=ios .
          
          # 3. LE COUP DE MÉDIATOR : Forcer le projet Xcode à cibler iOS 15.0 pour Firebase
          # Cela modifie directement la configuration brute pour éviter les crashs de compilation
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 4. Lancer la compilation officielle Flutter (génère le vrai bundle de l'app)
          flutter build ios --release --no-codesign
          
          # 5. Préparer le dossier Payload réglementaire exigé par AltStore
          rm -rf Payload
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          
          # Afficher le contenu dans les logs Codemagic pour vérification visuelle
          echo "=== VÉRIFICATION DU BUNDLE APP ==="
          ls -l Payload/Runner.app
          
          # 6. Compresser le tout dans le fichier .ipa final
          mkdir -p output
          rm -f output/VinylHube.ipa
          zip -r output/VinylHube.ipa Payload

    artifacts:
      - output/VinylHube.ipa